<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #1f2937, #111827);
        }
        .calc {
            width: min(100%, 320px);
            background: #0f172a;
            padding: 16px;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }
        #display {
            width: 100%;
            height: 64px;
            border: 0;
            border-radius: 12px;
            background: #e2e8f0;
            color: #0f172a;
            font-size: 2rem;
            text-align: right;
            padding: 0 14px;
            margin-bottom: 12px;
            outline: none;
        }
        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            height: 54px;
            border: 0;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            background: #1e293b;
            color: #fff;
        }
        button:hover { background: #334155; }
        .op { background: #f97316; }
        .op:hover { background: #ea580c; }
        .wide { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calc">
        <input id="display" type="text" value="0" readonly>
        <div class="keys">
            <button onclick="clearDisplay()">C</button>
            <button onclick="backspace()">⌫</button>
            <button onclick="press('/')" class="op">÷</button>
            <button onclick="press('*')" class="op">×</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('-')" class="op">−</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('+')" class="op">+</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="calculate()" class="op">=</button>

            <button onclick="press('0')" class="wide">0</button>
            <button onclick="press('.')">.</button>
            
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        function press(value) {
            if (display.value === '0' && /[0-9.]/.test(value)) display.value = '';
            display.value += value;
        }
        function clearDisplay() {
            display.value = '0';
        }
        function backspace() {
            display.value = display.value.length > 1 ? display.value.slice(0, -1) : '0';
        }
        function calculate() {
            try {
                display.value = eval(display.value.replace(/×/g, '*').replace(/÷/g, '/'));
            } catch {
                display.value = 'Error';
            }
        }
        document.addEventListener('keydown', (e) => {
            if (/^[0-9.+\-*/]$/.test(e.key)) press(e.key);
            else if (e.key === 'Enter') calculate();
            else if (e.key === 'Escape') clearDisplay();
            else if (e.key === 'Backspace') backspace();
        });
    </script>
</body>
</html>
